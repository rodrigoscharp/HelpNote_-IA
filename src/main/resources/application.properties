spring.application.name=Helpnote IA
upload.dir=./uploads

# PostgreSQL Datasource Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/helpnote_ia_db
spring.datasource.username=helpnote_user
spring.datasource.password=helpnote_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Spring AI Configuration
spring.ai.version=1.1.3-SNAPSHOT

